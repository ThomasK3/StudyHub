<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VŠE StudyHub</title>
  <meta name="description" content="Semestrální dashboard pro studenty FIS VŠE v Praze. Přehled předmětů, podmínek, termínů a AI plánovač zkouškového.">
  <meta property="og:title" content="VŠE StudyHub">
  <meta property="og:description" content="Semestrální dashboard pro studenty FIS VŠE. Předměty, termíny, podmínky a AI plánovač na jednom místě.">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#00957d">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/course-detail.css">
  <link rel="stylesheet" href="css/form.css">
  <link rel="stylesheet" href="css/calendar.css">
  <link rel="stylesheet" href="css/planner.css">
  <link rel="stylesheet" href="css/import.css">
  <link rel="stylesheet" href="css/catalog.css">
</head>
<body>

  <!-- Top utility bar -->
  <div class="topbar">
    <div class="page">
      <span class="topbar__text">Fakulta informatiky a statistiky</span>
    </div>
  </div>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="page navbar__inner">
      <a href="#/" class="navbar__brand">
        <span class="navbar__logo">VŠE</span>
        <span class="navbar__title">StudyHub</span>
      </a>
      <div class="navbar__nav">
        <a href="#/" class="navbar__link navbar__link--active">Přehled</a>
        <a href="#/calendar" class="navbar__link">Kalendář</a>
        <a href="#/browse" class="navbar__link">Katalog</a>
        <a href="#/course/new" class="navbar__link">Přidat předmět</a>
        <a href="#/planner" class="navbar__link">Plánovač</a>
        <a href="#/import" class="navbar__link">Import</a>
        <button class="navbar__theme-toggle" id="theme-toggle" type="button" title="Přepnout tmavý/světlý režim"></button>
      </div>
    </div>
  </nav>

  <!-- Semester switcher -->
  <div class="semester-bar" id="semester-bar" style="display:none">
    <div class="page semester-bar__inner">
      <div class="semester-bar__tabs" id="semester-tabs"></div>
    </div>
  </div>

  <!-- Main content -->
  <main id="app" class="page">
    <noscript>
      <div style="padding:2rem;text-align:center">
        <h2>VŠE StudyHub vyžaduje JavaScript</h2>
        <p>Povolit JavaScript v prohlížeči pro zobrazení aplikace.</p>
      </div>
    </noscript>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="page">
      <p class="footer__text">VŠE StudyHub &mdash; Semestrální dashboard pro studenty FIS VŠE v Praze</p>
      <p class="footer__copy">&copy; 2026 StudyHub. Neoficiální studentský projekt.</p>
    </div>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
